PAGES.archivo=async function(){
  try{
    const[prest,clis,cobs,pagos]=await Promise.all([
      GET('prestamos','?estado=eq.Finalizado&order=created_at.desc'),
      GET('clientes','?order=nombre.asc'),
      GET('cobradores','?select=id,numero,nombre'),
      GET('pagos','?select=prestamo_id,importe,tipo'),
    ]);

    // Agrupar por cliente
    const porCliente={};
    prest.forEach(p=>{
      if(!porCliente[p.cliente_id])porCliente[p.cliente_id]=[];
      porCliente[p.cliente_id].push(p);
    });

    const clientesConHistorial=clis.filter(c=>porCliente[c.id]);

    document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-title">📁 Archivo — Historial de clientes (${clientesConHistorial.length})</div>
      ${clientesConHistorial.length?`
      <div class="twrap"><table>
        <thead><tr><th>Cliente</th><th>Créditos</th><th>Cobrador</th><th>Último crédito</th><th>Total prestado</th><th>Comportamiento</th><th></th></tr></thead>
        <tbody>
          ${clientesConHistorial.map(c=>{
            const cob=cobs.find(x=>x.id===c.cobrador_id);
            const prestC=porCliente[c.id];
            const totalPrestado=prestC.reduce((a,p)=>a+p.monto,0);
            const ultimo=prestC[0];
            // Calcular comportamiento: % de cuotas pagadas a tiempo
            let pagasTotal=0,impagasTotal=0;
            prestC.forEach(p=>{
              const pagosP=pagos.filter(x=>x.prestamo_id===p.id&&x.tipo!=='Recargo'&&x.tipo!=='Gracia');
              const pagosDia={};
              pagosP.forEach(pg=>{pagosDia[pg.fecha]=(pagosDia[pg.fecha]||0)+pg.importe;});
              const dias=diasHabiles(p.fecha_inicio,p.cuotas);
              dias.forEach(d=>{
                const pago=pagosDia[d]||0;
                if(pago>=(p.cuota||0))pagasTotal++;
                else impagasTotal++;
              });
            });
            const total=pagasTotal+impagasTotal;
            const pct=total>0?Math.round((pagasTotal/total)*100):100;
            const compColor=pct>=90?'var(--green)':pct>=70?'var(--yellow)':'var(--red)';
            const compLabel=pct>=90?'Excelente':pct>=70?'Regular':'Con atrasos';
            return`<tr>
              <td><b>${c.nombre}</b><div style="font-size:11px;color:var(--muted)">${c.tel||'—'}</div></td>
              <td style="text-align:center;font-weight:700;color:var(--accent)">${prestC.length}</td>
              <td>${cob?`#${cob.numero} ${cob.nombre}`:'—'}</td>
              <td class="mono" style="font-size:11px">${fmtD(ultimo.fecha_inicio)} · ${ultimo.plan} días</td>
              <td style="font-weight:700">${fmt(totalPrestado)}</td>
              <td><span style="background:${compColor}22;color:${compColor};border:1px solid ${compColor}44;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600">${pct}% — ${compLabel}</span></td>
              <td style="white-space:nowrap">
                <button class="btn btn-sm btn-s" onclick="verHistorial('${c.id}')">Ver</button>
                <button class="btn btn-sm btn-p" onclick="reactivarCliente('${c.id}')">+ Nuevo crédito</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`:'<div class="empty">No hay clientes con créditos finalizados.</div>'}
    </div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="alert-b">Error: ${e.message}</div>`;}
};

async function verHistorial(cliId){
  const[c,prest]=await Promise.all([
    GET('clientes',`?id=eq.${cliId}`).then(r=>r[0]),
    GET('prestamos',`?cliente_id=eq.${cliId}&estado=eq.Finalizado&order=created_at.desc`)
  ]);
  let html=`<div style="margin-bottom:12px"><div style="font-size:16px;font-weight:700">${c.nombre}</div><div style="font-size:12px;color:var(--muted)">📞 ${c.tel||'—'}</div></div>`;
  for(const p of prest){
    const pagosP=await GET('pagos',`?prestamo_id=eq.${p.id}&order=fecha.asc`);
    const pagosReales=pagosP.filter(x=>x.tipo!=='Recargo'&&x.tipo!=='Gracia');
    const gracias=pagosP.filter(x=>x.tipo==='Gracia').length;
    const abonado=pagosReales.reduce((a,x)=>a+x.importe,0);
    const dias=diasHabiles(p.fecha_inicio,p.cuotas);
    const pagosDia={};
    pagosReales.forEach(pg=>{pagosDia[pg.fecha]=(pagosDia[pg.fecha]||0)+pg.importe;});
    let pagas=0,impagas=0;
    dias.forEach(d=>{const pg=pagosDia[d]||0;if(pg>=p.cuota)pagas++;else impagas++;});
    html+=`
    <div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px">
        <div style="font-size:12px;color:var(--muted)">${p.plan} días · inicio ${fmtD(p.fecha_inicio)}</div>
        <span style="background:#64748b22;color:#64748b;border:1px solid #64748b44;border-radius:6px;padding:2px 8px;font-size:11px">Finalizado</span>
      </div>
      <div class="g4" style="gap:8px">
        <div><div style="font-size:9px;color:var(--muted)">PRESTADO</div><b>${fmt(p.monto)}</b></div>
        <div><div style="font-size:9px;color:var(--muted)">TOTAL</div><b style="color:#7c3aed">${fmt(p.total)}</b></div>
        <div><div style="font-size:9px;color:var(--muted)">PAGAS</div><b style="color:var(--green)">${pagas} / ${p.cuotas}</b></div>
        <div><div style="font-size:9px;color:var(--muted)">IMPAGAS</div><b style="color:${impagas>0?'var(--red)':'var(--muted)'}">${impagas}</b></div>
      </div>
      ${gracias>0?`<div style="font-size:11px;color:var(--muted);margin-top:6px">🕊 ${gracias} día${gracias>1?'s':''} de gracia usados</div>`:''}
    </div>`;
  }
  html+=`<button class="btn btn-p" onclick="closeM();reactivarCliente('${cliId}')">+ Nuevo crédito</button>`;
  openM(`Historial — ${c.nombre}`,html);
}

async function exportarExcel(){
  try{
    const[clis,prest,pagos,cobs]=await Promise.all([
      GET('clientes','?order=nombre.asc'),
      GET('prestamos','?order=created_at.asc'),
      GET('pagos','?order=fecha.asc'),
      GET('cobradores','?order=numero.asc'),
    ]);

    // Construir CSV de clientes
    let csv='CLIENTES\n';
    csv+='Nombre,DNI,Teléfono,Dirección,Localidad,Cobrador\n';
    clis.forEach(c=>{
      const cob=cobs.find(x=>x.id===c.cobrador_id);
      csv+=`"${c.nombre||''}","${c.dni||''}","${c.tel||''}","${c.dir||''}","${c.loc||''}","${cob?'#'+cob.numero+' '+cob.nombre:''}"\n`;
    });

    csv+='\nPRÉSTAMOS\n';
    csv+='Cliente,Monto,Total,Cuota,Plan,Inicio,Estado\n';
    prest.forEach(p=>{
      const c=clis.find(x=>x.id===p.cliente_id);
      csv+=`"${c?.nombre||''}","${p.monto}","${p.total}","${p.cuota}","${p.plan} días","${p.fecha_inicio}","${p.estado}"\n`;
    });

    csv+='\nPAGOS\n';
    csv+='Cliente,Fecha,Importe,Tipo,Nota\n';
    pagos.forEach(pg=>{
      const pr=prest.find(x=>x.id===pg.prestamo_id);
      const c=clis.find(x=>x.id===pr?.cliente_id);
      csv+=`"${c?.nombre||''}","${pg.fecha}","${pg.importe}","${pg.tipo||'Normal'}","${pg.nota||''}"\n`;
    });

    // Descargar
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const fecha=new Date().toISOString().slice(0,10);
    a.href=url;a.download=`credidey-backup-${fecha}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Guardar fecha del último backup
    localStorage.setItem('ultimoBackup',new Date().toISOString());
    alert(`✓ Backup guardado: credidey-backup-${fecha}.csv\nGuardalo en Google Drive o en un lugar seguro.`);
  }catch(e){alert('Error al exportar: '+e.message);}
}

function verificarBackup(){
  const ultimo=localStorage.getItem('ultimoBackup');
  if(!ultimo){
    mostrarBannerBackup('Nunca hiciste un backup. ¡Guardá una copia de tus datos!');
    return;
  }
  const dias=Math.floor((new Date()-new Date(ultimo))/(1000*60*60*24));
  if(dias>=7)mostrarBannerBackup(`Último backup hace ${dias} días. ¡Recomendamos hacerlo semanalmente!`);
}

function mostrarBannerBackup(msg){
  const banner=document.createElement('div');

  banner.style.cssText='position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:320px;font-size:12px';
  banner.innerHTML=`
    <div>⚠ <b>Backup</b><br>${msg}</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button onclick="exportarExcel();document.getElementById('backup-banner').remove()" style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:11px;white-space:nowrap">📥 Exportar ahora</button>
      <button onclick="document.getElementById('backup-banner').remove()" style="background:#475569;color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:11px">Más tarde</button>
    </div>`;
  document.body.appendChild(banner);
}
