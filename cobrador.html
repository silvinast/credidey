<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrediDey — Cobros</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f4f8;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#1e1b4b;}
.header{background:linear-gradient(135deg,#1e3a5f,#2d5986);color:#fff;padding:16px;text-align:center;}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.header h1 span{color:#F59E0B;}
.header p{font-size:12px;opacity:.8;margin-top:4px;}
.container{padding:14px;max-width:500px;margin:0 auto;}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0;}
.field{margin-bottom:12px;}
.field label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-family:'JetBrains Mono',monospace;display:block;margin-bottom:4px;}
input,select{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#1e1b4b;outline:none;}
input:focus,select:focus{border-color:#1e3a5f;background:#fff;}
.btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:8px;}
.btn-p{background:linear-gradient(135deg,#1e3a5f,#2d5986);color:#fff;}
.btn-g{background:#16a34a;color:#fff;}
.btn-s{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;}
.cliente-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .2s;}
.cliente-card.completo{border-color:#86efac;background:#f0fdf4;}
.cli-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.cli-nombre{font-weight:700;font-size:15px;}
.cli-info{font-size:11px;color:#64748b;margin-top:2px;}
.cli-cuota{font-size:13px;color:#2d5986;font-weight:700;}
.opciones{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.op-btn{padding:10px 6px;border-radius:8px;border:2px solid #e2e8f0;background:#f8fafc;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.3;}
.op-btn.sel-pago{background:#dcfce7;border-color:#16a34a;color:#15803d;}
.op-btn.sel-nopago{background:#fee2e2;border-color:#dc2626;color:#b91c1c;}
.op-btn.sel-parcial{background:#fff7ed;border-color:#F59E0B;color:#92400e;}
.op-btn.sel-gracia{background:#f0f9ff;border-color:#0891b2;color:#0e7490;}
.medio-pago{display:none;margin-top:8px;}
.medio-pago.show{display:block;}
.medio-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px;}
.medio-btn{padding:8px 4px;border-radius:8px;border:2px solid #e2e8f0;background:#f8fafc;font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;}
.medio-btn.sel{background:#ede9fe;border-color:#7c3aed;color:#6d28d9;}
.monto-input{display:none;margin-top:8px;}
.monto-input.show{display:block;}
.resumen-caja{background:linear-gradient(135deg,#1e3a5f,#2d5986);color:#fff;border-radius:12px;padding:16px;margin-bottom:12px;}
.caja-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;}
.caja-row:last-child{margin-bottom:0;border-top:1px solid rgba(255,255,255,.2);padding-top:8px;margin-top:4px;font-weight:700;}
.loading{text-align:center;padding:40px;color:#64748b;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#1e3a5f;border-radius:50%;animation:sp .7s linear infinite;margin-bottom:8px;}
@keyframes sp{to{transform:rotate(360deg)}}
.enviado{background:#dcfce7;border:2px solid #16a34a;border-radius:12px;padding:24px;text-align:center;}
.pin-screen{max-width:320px;margin:40px auto;}
.badge-medio{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-left:4px;}
.ef{background:#fef3c7;color:#92400e;}
.tr{background:#dbeafe;color:#1e40af;}
.trcob{background:#ede9fe;color:#6d28d9;}
</style>
</head>
<body>
<div class="header">
  <h1>Credi<span>Dey</span></h1>
  <p id="header-sub">Sistema de cobros</p>
</div>
<div class="container" id="app">
  <div class="loading"><div class="spin"></div><br>Cargando...</div>
</div>
<script>
const SB='https://tfjdafgjrgahubjwddxe.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmamRhZmdqcmdhaHViandkZHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTUzODAsImV4cCI6MjA5NjM5MTM4MH0.jofWhNl8U70L73EAQ4MvcUmIIm1lvsxsEIeLZHhpmR8';
const fmt=n=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);
const today=()=>new Date().toISOString().slice(0,10);
const app=document.getElementById('app');
async function GET(t,q=''){const r=await fetch(`${SB}/rest/v1/${t}${q}`,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});const tx=await r.text();return tx?JSON.parse(tx):[];}
async function POST(t,b){const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'},body:JSON.stringify(b)});const tx=await r.text();return tx?JSON.parse(tx):[];}
async function PATCH(t,q,b){await fetch(`${SB}/rest/v1/${t}${q}`,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK},body:JSON.stringify(b)});}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function diasHabiles(inicio,n){const dias=[];const d=new Date(inicio+'T12:00:00');while(dias.length<n){d.setDate(d.getDate()+1);if(d.getDay()!==0)dias.push(d.toISOString().slice(0,10));}return dias;}

let cobrador=null,prestamos=[],cobros={},planillaId=null;

async function init(){
  const params=new URLSearchParams(window.location.search);
  const cobId=params.get('c'),pin=params.get('pin');
  if(!cobId){app.innerHTML=`<div class="card" style="text-align:center;padding:24px"><div style="font-size:32px">⚠️</div><div style="font-weight:700;color:#dc2626;margin-top:8px">Link inválido</div></div>`;return;}
  const cobs=await GET('cobradores',`?id=eq.${cobId}`);
  if(!cobs.length){app.innerHTML=`<div class="card" style="text-align:center;padding:24px"><div style="font-weight:700;color:#dc2626">Cobrador no encontrado</div></div>`;return;}
  cobrador=cobs[0];
  if(!pin){mostrarPin(cobId);return;}
  const pinEsp=String(cobrador.pin||cobrador.numero).slice(-4).padStart(4,'0');
  if(pin!==pinEsp){mostrarPin(cobId,'PIN incorrecto');return;}
  cargarPlanilla();
}

function mostrarPin(cobId,err=''){
  document.getElementById('header-sub').textContent='Ingresá tu PIN';
  app.innerHTML=`<div class="pin-screen"><div class="card">
    <div style="text-align:center;margin-bottom:16px"><div style="font-size:40px">🔐</div>
    <div style="font-weight:700;font-size:16px;margin-top:8px">PIN de acceso</div>
    <div style="font-size:12px;color:#64748b;margin-top:4px">Últimos 4 dígitos de tu número de cobrador</div></div>
    ${err?`<div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:8px;text-align:center;font-size:12px;margin-bottom:12px">${err}</div>`:''}
    <div class="field"><label>PIN</label>
    <input type="password" id="pin-input" maxlength="4" inputmode="numeric" placeholder="••••" style="text-align:center;font-size:24px;letter-spacing:8px"/></div>
    <button class="btn btn-p" onclick="verificarPin('${cobId}')">Ingresar</button>
  </div></div>`;
  document.getElementById('pin-input')?.focus();
}
function verificarPin(cobId){const pin=document.getElementById('pin-input').value;if(pin.length<4){alert('Ingresá 4 dígitos');return;}window.location.href=`?c=${cobId}&pin=${pin}`;}

async function cargarPlanilla(){
  const hoy=today();
  document.getElementById('header-sub').textContent=`${cobrador.nombre} — ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}`;
  const existente=await GET('cobros_pendientes',`?cobrador_id=eq.${cobrador.id}&fecha=eq.${hoy}`);
  if(existente.length){
    planillaId=existente[0].id;
    cobros=existente[0].items||{};
    if(existente[0].estado==='enviado'){mostrarEnviada();return;}
  }
  const clis=await GET('clientes',`?cobrador_id=eq.${cobrador.id}`);
  const cliIds=clis.map(c=>c.id);
  if(!cliIds.length){app.innerHTML=`<div class="card"><div style="text-align:center;padding:24px;color:#64748b">No tenés clientes asignados.</div></div>`;return;}
  const prest=await GET('prestamos',`?estado=eq.Activo&cliente_id=in.(${cliIds.join(',')})`);
  prestamos=prest.filter(p=>{const dias=diasHabiles(p.fecha_inicio,p.cuotas);return dias.includes(hoy);})
    .map(p=>{const cli=clis.find(c=>c.id===p.cliente_id)||{};const dias=diasHabiles(p.fecha_inicio,p.cuotas);return{...p,cli,nr:dias.indexOf(hoy)+1};});
  if(!prestamos.length){app.innerHTML=`<div class="card"><div style="text-align:center;padding:24px;color:#64748b">No hay cobros para hoy.</div></div>`;return;}
  renderPlanilla();
}

function calcCaja(){
  let efectivo=0,transferencia=0,transfCobrador=0;
  prestamos.forEach(p=>{
    const c=cobros[p.id];if(!c||c.tipo==='nopago'||c.tipo==='gracia')return;
    const monto=c.tipo==='pago'?p.cuota:(c.monto||0);
    if(c.medio==='efectivo')efectivo+=monto;
    else if(c.medio==='transferencia')transferencia+=monto;
    else if(c.medio==='transfcobrador')transfCobrador+=monto;
  });
  return{efectivo,transferencia,transfCobrador,total:efectivo+transferencia+transfCobrador};
}

function renderPlanilla(){
  const completados=Object.keys(cobros).length;
  const caja=calcCaja();
  app.innerHTML=`
  <div class="resumen-caja">
    <div class="caja-row"><span>💵 Efectivo a rendir:</span><b>${fmt(caja.efectivo)}</b></div>
    <div class="caja-row"><span>🏦 Transfer. cliente:</span><b>${fmt(caja.transferencia)}</b></div>
    <div class="caja-row"><span>📲 Transfer. cobrador:</span><b>${fmt(caja.transfCobrador)}</b></div>
    <div class="caja-row"><span>Total cobrado:</span><b>${fmt(caja.total)}</b></div>
  </div>
  ${prestamos.map(p=>{
    const c=cobros[p.id]||{};const tipo=c.tipo||'';const medio=c.medio||'';
    const completo=tipo!=='';
    const medioLabel=medio==='efectivo'?'<span class="badge-medio ef">Efectivo</span>':medio==='transferencia'?'<span class="badge-medio tr">Transfer. cliente</span>':medio==='transfcobrador'?'<span class="badge-medio trcob">Transfer. cobrador</span>':'';
    return`<div class="cliente-card ${completo?'completo':''}" id="card-${p.id}">
      <div class="cli-header">
        <div>
          <div class="cli-nombre">${p.cli.nombre||'—'}${medioLabel}</div>
          <div class="cli-info">📞 ${p.cli.tel||'—'} · Cuota #${p.nr}/${p.cuotas}</div>
        </div>
        <div style="text-align:right">
          <div class="cli-cuota">${fmt(p.cuota)}</div>
          ${tipo?`<div style="font-size:10px;font-weight:700;margin-top:3px;color:${tipo==='pago'?'#16a34a':tipo==='nopago'?'#dc2626':tipo==='parcial'?'#F59E0B':'#0891b2'}">${tipo==='pago'?'✓ Pagó':tipo==='nopago'?'✗ No pagó':tipo==='parcial'?'~ Parcial':'🕊 Gracia'}</div>`:''}</div>
      </div>
      <div class="opciones">
        <div class="op-btn ${tipo==='pago'?'sel-pago':''}" onclick="selTipo('${p.id}','pago')">✓ Pagó<br><small>completo</small></div>
        <div class="op-btn ${tipo==='nopago'?'sel-nopago':''}" onclick="selTipo('${p.id}','nopago')">✗ No pagó</div>
        <div class="op-btn ${tipo==='parcial'?'sel-parcial':''}" onclick="selTipo('${p.id}','parcial')">~ Parcial</div>
        <div class="op-btn ${tipo==='gracia'?'sel-gracia':''}" onclick="selTipo('${p.id}','gracia')">🕊 Gracia</div>
      </div>
      <div class="monto-input ${tipo==='parcial'?'show':''}" id="monto-${p.id}">
        <input type="number" placeholder="Monto cobrado" value="${c.monto||''}" onchange="setMonto('${p.id}',this.value)"/>
      </div>
      <div class="medio-pago ${(tipo==='pago'||tipo==='parcial')?'show':''}" id="medio-${p.id}">
        <div style="font-size:10px;color:#64748b;margin-bottom:4px;font-family:'JetBrains Mono',monospace">MEDIO DE PAGO</div>
        <div class="medio-btns">
          <div class="medio-btn ${medio==='efectivo'?'sel':''}" onclick="selMedio('${p.id}','efectivo')">💵<br>Efectivo</div>
          <div class="medio-btn ${medio==='transferencia'?'sel':''}" onclick="selMedio('${p.id}','transferencia')">🏦<br>Transfer.<br>cliente</div>
          <div class="medio-btn ${medio==='transfcobrador'?'sel':''}" onclick="selMedio('${p.id}','transfcobrador')">📲<br>Transfer.<br>cobrador</div>
        </div>
      </div>
    </div>`;
  }).join('')}
  <div style="margin-top:8px">
    <button class="btn btn-g" onclick="enviarPlanilla()">📤 Enviar para aprobación</button>
    <button class="btn btn-s" onclick="guardarBorrador()">💾 Guardar borrador</button>
  </div>
  <div style="height:20px"></div>`;
}

function selTipo(prestId,tipo){
  if(!cobros[prestId])cobros[prestId]={};
  cobros[prestId].tipo=tipo;
  if(tipo==='nopago'||tipo==='gracia')cobros[prestId].medio='';
  renderPlanilla();
  setTimeout(()=>document.getElementById(`card-${prestId}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function selMedio(prestId,medio){
  if(!cobros[prestId])cobros[prestId]={};
  cobros[prestId].medio=medio;
  renderPlanilla();
}
function setMonto(prestId,val){if(!cobros[prestId])cobros[prestId]={tipo:'parcial'};cobros[prestId].monto=parseFloat(val)||0;}

async function guardarBorrador(){
  try{
    const hoy=today();
    if(planillaId){await PATCH('cobros_pendientes',`?id=eq.${planillaId}`,{items:cobros,estado:'borrador'});}
    else{const res=await POST('cobros_pendientes',{id:uid(),cobrador_id:cobrador.id,fecha:hoy,estado:'borrador',items:cobros});if(res[0])planillaId=res[0].id;}
    alert('✓ Borrador guardado');
  }catch(e){alert('Error: '+e.message);}
}

async function enviarPlanilla(){
  const sinMedio=prestamos.filter(p=>{const c=cobros[p.id];return c&&(c.tipo==='pago'||c.tipo==='parcial')&&!c.medio;});
  if(sinMedio.length){alert(`${sinMedio.length} cliente${sinMedio.length>1?'s':''} sin medio de pago seleccionado. Por favor completá el medio (efectivo o transferencia).`);return;}
  const faltan=prestamos.filter(p=>!cobros[p.id]).length;
  if(faltan>0&&!confirm(`Faltan ${faltan} cliente${faltan>1?'s':''} sin registrar. ¿Enviás igual?`))return;
  try{
    const hoy=today();
    if(planillaId){await PATCH('cobros_pendientes',`?id=eq.${planillaId}`,{items:cobros,estado:'enviado'});}
    else{await POST('cobros_pendientes',{id:uid(),cobrador_id:cobrador.id,fecha:hoy,estado:'enviado',items:cobros});}
    mostrarEnviada();
  }catch(e){alert('Error: '+e.message);}
}

function mostrarEnviada(){
  const caja=calcCaja();
  app.innerHTML=`<div class="enviado">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <div style="font-weight:800;font-size:18px;color:#15803d;margin-bottom:8px">Planilla enviada</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:16px">CrediDey va a revisar y aprobar los cobros.</div>
    <div style="background:#fff;border-radius:10px;padding:14px;text-align:left;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>💵 Efectivo a rendir:</span><b style="color:#92400e">${fmt(caja.efectivo)}</b></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>🏦 Transfer. clientes:</span><b style="color:#1e40af">${fmt(caja.transferencia)}</b></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>📲 Transfer. cobrador:</span><b style="color:#6d28d9">${fmt(caja.transfCobrador)}</b></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid #e2e8f0;padding-top:8px;margin-top:4px"><b>Total cobrado:</b><b style="color:#1e3a5f">${fmt(caja.total)}</b></div>
    </div>
    ${caja.efectivo>0?`<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px;font-size:12px;color:#92400e;margin-bottom:12px">⚠ Tenés <b>${fmt(caja.efectivo)}</b> en efectivo para rendir.</div>`:''}
    <button class="btn btn-s" onclick="location.reload()">Ver planilla</button>
  </div>`;
}

init();
</script>
</body>
</html>
